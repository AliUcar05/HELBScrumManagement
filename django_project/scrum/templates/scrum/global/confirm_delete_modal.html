{% load static %}

<div class="modal fade" id="confirmDeleteModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
        <div class="modal-content" style="border-radius: 8px; border: none; box-shadow: 0 8px 32px rgba(0,0,0,.18);">
            <div class="modal-body p-4">
                <div class="d-flex align-items-center mb-3" style="gap: 12px;">
                    <div style="width:36px;height:36px;border-radius:50%;background:#ffebe6;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i class="fas fa-trash" style="color:#de350b;font-size:15px;"></i>
                    </div>
                    <h5 id="confirmDeleteTitle" style="margin:0;font-weight:700;color:#172b4d;font-size:16px;">
                        Delete?
                    </h5>
                </div>

                <p id="confirmDeleteMessage" style="color:#6b778c;font-size:14px;margin-bottom:6px;"></p>
                <p id="confirmDeleteWarning" style="color:#6b778c;font-size:12px;margin-bottom:0;"></p>

                <form id="confirmDeleteForm" method="POST" action="">
                    {% csrf_token %}
                    <div class="d-flex justify-content-end mt-4" style="gap: 8px;">
                        <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-danger btn-sm" id="confirmDeleteBtn">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    function confirmDelete(options) {
        var title   = options.title   || 'Delete?';
        var message = options.message || '';
        var warning = options.warning || 'This action is irreversible.';
        var action  = options.action  || '';
        var btnLabel = options.btnLabel || 'Delete';

        document.getElementById('confirmDeleteTitle').textContent   = title;
        document.getElementById('confirmDeleteMessage').innerHTML   = message;
        document.getElementById('confirmDeleteWarning').textContent = warning;
        document.getElementById('confirmDeleteForm').action         = action;
        document.getElementById('confirmDeleteBtn').textContent     = btnLabel;

        $('#confirmDeleteModal').modal('show');
    }
</script>
