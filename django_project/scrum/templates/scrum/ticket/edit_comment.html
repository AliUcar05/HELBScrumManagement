<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Modifier le commentaire</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white p-3">
                        <h5 class="mb-0">Modifier votre commentaire</h5>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Votre message :</label>
                                {{ form.content }}
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <button type="button" onclick="history.back()" class="btn btn-outline-secondary">Annuler</button>
                                <button type="submit" class="btn btn-primary px-4">Enregistrer les modifications</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <style>
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
        }
    </style>
</body>
</html>
