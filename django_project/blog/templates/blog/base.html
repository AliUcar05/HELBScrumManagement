{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

    <link rel="stylesheet" type="text/css" href="{% static 'blog/main.css' %}">

    <title>ScrumManagement</title>
</head>

<body>
<header class="site-header">
  <nav class="navbar navbar-expand-md navbar-dark bg-steel fixed-top">
    <div class="container">

      <!-- LOGO + NOM -->
      <a class="navbar-brand d-flex align-items-center"
         href="{% url 'project-list' %}">
        <img src="{% static 'blog/images/logo.png' %}"
             width="50"
             class="mr-2"
             alt="Logo">
        ScrumManagement
      </a>

      <button class="navbar-toggler" type="button"
              data-toggle="collapse"
              data-target="#navbarToggle">
          <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarToggle">

        <!-- Menu gauche -->
        <div class="navbar-nav mr-auto">
          <a class="nav-item nav-link" href="{% url 'project-list' %}">Projects</a>
        </div>

        <!-- Menu droite -->
        <div class="navbar-nav">
          {% if user.is_authenticated %}
            <a class="nav-item nav-link" href="{% url 'project-create' %}">New Project</a>
            <a class="nav-item nav-link" href="{% url 'profile' %}">Profile</a>
            <a class="nav-item nav-link" href="{% url 'logout' %}">Logout</a>
          {% else %}
            <a class="nav-item nav-link" href="{% url 'login' %}">Login</a>
            <a class="nav-item nav-link" href="{% url 'register' %}">Register</a>
          {% endif %}
        </div>

      </div>
    </div>
  </nav>
</header>

<main role="main" class="container" style="margin-top: 100px;">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}

</main>

<!-- JS Bootstrap 4 -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

</body>
</html>
